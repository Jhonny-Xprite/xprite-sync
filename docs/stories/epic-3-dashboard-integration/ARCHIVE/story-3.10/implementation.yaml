        description: "Test with curl to verify API returns real Supabase data"
        service: backend
        verification:
          type: command
          command: "curl http://localhost:3000/api/metrics?limit=10"
        status: pending

      - id: "4.2"
        description: "Unit tests for useRealAgentMetrics hook"
        service: frontend
        files:
          - packages/dashboard/src/hooks/useRealAgentMetrics.test.ts
        verification:
          type: command
          command: "npm run test"
        status: pending

      - id: "4.3"
        description: "Lint & type check pass"
        service: frontend
        verification:
          type: command
          command: "npm run lint && npm run typecheck"
        status: pending

      - id: "4.4"
        description: "E2E test: Real data displays on dashboard"
        service: frontend
        verification:
          type: browser
          url: "http://localhost:5175"
          actions: ["Verify agents show real metrics", "Verify data from Supabase", "Verify no mock data"]
        status: pending
