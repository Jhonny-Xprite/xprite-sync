testing_levels:
  unit:
    - Service functions (file scanning, YAML parsing, aggregations)
    - Hook behavior (polling, error handling, caching)
    - Effort: 8-12 hours

  integration:
    - Component rendering with mock API
    - Hook + component interaction
    - Error boundary behavior
    - Effort: 8-12 hours

  e2e:
    - Full dashboard with real API
    - Real Supabase database
    - Metrics collection to persistence
