## ARCHITECTURE DECISIONS & RATIONALE

architectural_principles:
  - Anti-Mentira: Never return fake data. Show empty state if no real data.
  - Graceful Degradation: If any data source fails, show what's available.
  - Progressive Enhancement: Start simple (hardcoded), evolve to flexible.
  - Performance First: Metrics collection must not impact dashboard UX.
  - Testability: Each component independently testable with mock data.

api_design:
  - Response Format: All endpoints return { data: T[], total: number, limit?: number }
  - Error Format: { error: string; code: string; statusCode: number }
  - Auth: No authentication in MVP (assumes internal dashboard)
  - Rate Limiting: Not implemented in MVP (can add later)
  - Pagination: Not implemented in MVP (assume small datasets)

data_sources:
  - Agent Metrics: Supabase metrics table (populated by SystemMetricsCollector)
  - Workflows: File system scan (.aiox-core/development/workflows/*.yaml)
  - Stories: File system scan (docs/stories/**/[0-9]+.[0-9]+.story.md)
  - Squads: Priority (1) team_members table, (2) core-config.yaml
  - Handoffs: File system (.aiox/handoffs/*.yaml)
  - Memory: File system (.claude/projects/*/memory/)
  - MCP Registry: File system (extensions/mcp-registry.json)
  - Engine Status: HTTP health check (localhost:4002/health) + SystemMetricsCollector
  - GitHub: Environment variables (GITHUB_OWNER, GITHUB_REPO)

caching_strategy:
  - Metrics: React Query 5-second refetch (dashboard-level)
  - Stories/Workflows/Handoffs: 30-second TTL (file system reads are slow)
  - Squads: 30-second TTL
  - Analytics: Redis 5-minute TTL (large aggregation queries, lower update frequency)
  - Memory: 30-second TTL

performance_targets:
  - API response time: < 500ms (except analytics < 1000ms)
  - Dashboard FCP: < 2s
  - Metrics collection overhead: < 100ms CPU
  - Metrics persistence: < 200ms (async, non-blocking)

error_handling:
  - API errors: Return error response with code + message
  - Network errors: Retry with exponential backoff (React Query)
  - Missing data: Return empty arrays (not null)
  - Failed metrics collection: Log error, retry next cycle, don't crash
  - Component errors: Error boundary + fallback UI

